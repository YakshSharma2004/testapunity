version: '3.8'
services:
  db:
    image: postgres:16-alpine
    container_name: testapi1_postgres
    environment:
      POSTGRES_USER: npcdb
      POSTGRES_PASSWORD: npclore
      POSTGRES_DB: testapi1_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

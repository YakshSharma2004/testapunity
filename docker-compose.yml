services:
  redis:
    image: redis:7-alpine
    command:
      ["redis-server","--appendonly","yes","--maxmemory","${REDIS_MAXMEMORY:-1gb}","--maxmemory-policy","${REDIS_MAXMEMORY_POLICY:-allkeys-lru}"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-testgame}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
volumes:
  redis_data:
  qdrant_data:
  pg_data:
